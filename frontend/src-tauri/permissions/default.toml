[[permission]]
identifier = "allow-all-commands"
description = "Allows all custom Metadea commands"
commands.allow = [
  "init_database",
  "store_auth_token",
  "get_auth_token",
  "clear_auth_token",
  "save_library_item",
  "get_library_items",
  "get_library_stats",
  "scan_all_games",
  "pick_folder",
  "scan_folder_contents",
  "get_local_folders",
  "save_local_folders",
  "read_routes",
  "write_routes",
  "read_env_config",
  "write_env_config",
  "save_user_image",
  "get_user_image",
  "remove_user_image",
  "igdb_search",
  "igdb_get_cover_by_steam_id",
  "read_metadata_index",
  "debug_scan_info",
  "open_env_folder",
]
