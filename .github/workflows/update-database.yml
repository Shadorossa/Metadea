name: 'Update Community Database'

on:
  push:
    branches:
      - main
    paths:
      - 'catalog/**.json'
      - 'scripts/build-database.js'

jobs:
  build-database:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build database.db from catalog/**.json
        run: node --experimental-sqlite scripts/build-database.js

      # Published as a Release asset instead of committed to main — a
      # commit-to-main step here would grow the repo's git history by a
      # near-full copy of database.db on every single merged proposal
      # (binary diffs don't compress), forever, with no ceiling. The
      # 'catalog-latest' release's asset is overwritten in place on every
      # run instead, so the repo never grows from this at all no matter how
      # many proposals get merged. The desktop app (sync_community_catalog,
      # media_catalog.rs) downloads this fixed release asset URL, not a
      # branch-tracked raw file.
      - name: Publish database.db to the catalog-latest release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: catalog-latest
          name: 'Community catalog (auto-updated)'
          body: 'Auto-generated by update-database.yml — always reflects every merged collaborative-catalog proposal in catalog/. Not a versioned app release; downloaded at runtime by the desktop app.'
          files: database.db
          # This tag is a moving pointer, not a real version — every run
          # replaces the previous asset in place rather than creating a new
          # release each time.
          prerelease: true
